# .goreleaser.yml
# GoReleaser configuration for cfmon
# https://goreleaser.com

version: 2

project_name: cfmon

before:
  hooks:
    - go mod tidy

builds:
  - id: cfmon
    main: .
    binary: cfmon
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.BuildTime={{.Date}}
      - -X main.GitCommit={{.ShortCommit}}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: cfmon
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE*
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-dev"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "Merge pull request"
      - "Merge branch"
  groups:
    - title: "New Features"
      regexp: "^feat"
      order: 0
    - title: "Bug Fixes"
      regexp: "^fix"
      order: 1
    - title: "Performance Improvements"
      regexp: "^perf"
      order: 2
    - title: "Refactoring"
      regexp: "^refactor"
      order: 3
    - title: "Other Changes"
      order: 999

release:
  github:
    owner: PeterHiroshi
    name: cfmon

  header: |
    ## cfmon v{{ .Version }}

    Cloudflare Workers & Containers CLI monitoring tool.

  footer: |
    ---

    ### Installation

    #### Script installer
    ```bash
    curl -sSL https://raw.githubusercontent.com/PeterHiroshi/cfmon/main/scripts/install.sh | bash
    ```

    #### Go install
    ```bash
    go install github.com/PeterHiroshi/cfmon@v{{ .Version }}
    ```

    #### Manual
    Download the appropriate binary for your platform from the assets below.

    **Full documentation**: https://github.com/PeterHiroshi/cfmon

  draft: false
  prerelease: auto
  mode: replace
  name_template: "v{{.Version}}"
